name: iOS Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'RickMortyChallenge.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "RickMortyChallenge.xcodeproj" \
            -scheme "RickMortyChallenge"

      - name: Run Unit + UI Tests
        run: |
          xcodebuild test \
            -project "RickMortyChallenge.xcodeproj" \
            -scheme "RickMortyChallenge" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.5"

      - name: Run Screenshot Regression Tests
        run: |
          xcodebuild test \
            -project "RickMortyChallenge.xcodeproj" \
            -scheme "RickMortyChallengeScreenshotTests" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.5"
